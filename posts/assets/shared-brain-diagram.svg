<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 380" role="img" aria-labelledby="title desc">
  <title id="title">Shared brain branching to sessions</title>
  <desc id="desc">BRAIN.md is shown in the center, branching out to multiple research sessions.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="1" stop-color="#091a2b"/>
    </linearGradient>
  </defs>
  <rect width="920" height="380" rx="24" fill="url(#bg)"/>
  <text x="48" y="58" fill="#ffb27a" font-family="JetBrains Mono, monospace" font-size="16" font-weight="700">shared brain</text>
  <text x="48" y="84" fill="#a0bfda" font-family="Inter, sans-serif" font-size="13">One memory file coordinates separate research sessions.</text>

  <rect x="356" y="132" width="208" height="116" rx="18" fill="#0b2237" stroke="#6ee7ff" stroke-width="2"/>
  <text x="460" y="184" fill="#f3f8ff" font-family="Inter, sans-serif" font-size="26" font-weight="850" text-anchor="middle">BRAIN.md</text>
  <text x="460" y="212" fill="#a0bfda" font-family="Inter, sans-serif" font-size="13" text-anchor="middle">shared research state</text>

  <g fill="#0d1c2e" stroke="#395b78" stroke-width="1.5">
    <rect x="78" y="112" width="158" height="76" rx="14"/>
    <rect x="88" y="252" width="158" height="76" rx="14"/>
    <rect x="674" y="112" width="158" height="76" rx="14"/>
    <rect x="664" y="252" width="158" height="76" rx="14"/>
  </g>

  <g font-family="Inter, sans-serif" text-anchor="middle">
    <text x="157" y="144" fill="#f3f8ff" font-size="15" font-weight="800">session A</text>
    <text x="157" y="166" fill="#a0bfda" font-size="12">reads context</text>
    <text x="167" y="284" fill="#f3f8ff" font-size="15" font-weight="800">session B</text>
    <text x="167" y="306" fill="#a0bfda" font-size="12">adds findings</text>
    <text x="753" y="144" fill="#f3f8ff" font-size="15" font-weight="800">session C</text>
    <text x="753" y="166" fill="#a0bfda" font-size="12">tests variants</text>
    <text x="743" y="284" fill="#f3f8ff" font-size="15" font-weight="800">session D</text>
    <text x="743" y="306" fill="#a0bfda" font-size="12">keeps / discards</text>
  </g>

  <g fill="none" stroke="#ff8a3d" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <path d="M356 164C302 148 274 148 236 150"/>
    <path d="M356 222C300 252 278 282 246 290"/>
    <path d="M564 164C616 148 640 148 674 150"/>
    <path d="M564 222C610 250 634 280 664 290"/>
  </g>
  <g fill="#ff8a3d">
    <path d="M236 150l12-7v14z"/>
    <path d="M246 290l13-2-8 11z"/>
    <path d="M674 150l-12-7v14z"/>
    <path d="M664 290l-13-2 8 11z"/>
  </g>
</svg>
