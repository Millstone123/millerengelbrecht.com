<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620" role="img" aria-labelledby="title desc">
  <title id="title">Redacted DNS TXT configuration</title>
  <desc id="desc">A simplified DNS dashboard showing a TXT record used as a runtime payload channel, with the command redacted.</desc>
  <defs>
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <style>
      .ui{font-family:Inter,Arial,sans-serif}
      .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
      .head{font-size:21px;font-weight:700;fill:#111827}
      .label{font-size:16px;font-weight:700;fill:#4b5563}
      .cell{font-size:20px;fill:#111827}
      .muted{font-size:15px;fill:#6b7280}
    </style>
  </defs>
  <rect width="1100" height="620" rx="18" fill="#f8fafc"/>
  <rect x="34" y="34" width="1032" height="552" rx="12" fill="#ffffff" stroke="#cbd5e1"/>

  <text x="62" y="84" class="ui head">controlled-domain.example</text>
  <text x="62" y="112" class="ui muted">DNS records</text>
  <rect x="866" y="58" width="148" height="48" rx="7" fill="#2563eb"/>
  <text x="898" y="89" class="ui" font-size="17" font-weight="700" fill="#ffffff">Add record</text>

  <rect x="62" y="150" width="976" height="54" rx="6" fill="#f9fafb" stroke="#d1d5db"/>
  <text x="84" y="184" class="ui muted">Filter records...</text>

  <rect x="62" y="230" width="976" height="48" fill="#f3f4f6"/>
  <text x="82" y="261" class="ui label">TYPE</text>
  <text x="188" y="261" class="ui label">HOST</text>
  <text x="488" y="261" class="ui label">ANSWER / VALUE</text>
  <text x="936" y="261" class="ui label">TTL</text>

  <line x1="62" y1="278" x2="1038" y2="278" stroke="#e5e7eb"/>
  <rect x="82" y="312" width="38" height="28" rx="5" fill="#3b82f6"/>
  <text x="95" y="333" class="ui" font-size="16" font-weight="700" fill="#ffffff">A</text>
  <text x="188" y="335" class="ui cell">controlled-domain.example</text>
  <text x="488" y="335" class="mono cell">&lt;server-ip&gt;</text>
  <text x="936" y="335" class="ui cell">600</text>

  <line x1="62" y1="370" x2="1038" y2="370" stroke="#e5e7eb"/>
  <rect x="82" y="410" width="54" height="30" rx="5" fill="#22c55e"/>
  <text x="93" y="432" class="ui" font-size="16" font-weight="700" fill="#ffffff">TXT</text>
  <text x="188" y="424" class="ui cell">_axiom-config</text>
  <text x="188" y="454" class="ui cell">controlled-domain.example</text>

  <rect x="488" y="400" width="372" height="72" rx="8" fill="#e5e7eb" filter="url(#softBlur)"/>
  <rect x="488" y="400" width="372" height="72" rx="8" fill="#111827" opacity=".08"/>
  <text x="514" y="431" class="mono" font-size="18" font-weight="700" fill="#111827">COMMAND REDACTED</text>
  <text x="514" y="458" class="mono" font-size="15" fill="#6b7280">&lt;encoded loader returned at runtime&gt;</text>
  <text x="936" y="438" class="ui cell">600</text>

  <rect x="488" y="506" width="444" height="48" rx="8" fill="#fff7ed" stroke="#fdba74"/>
  <text x="510" y="537" class="ui" font-size="18" fill="#9a3412">DNS is the control point, not the repository commit.</text>
</svg>
