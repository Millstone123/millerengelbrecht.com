<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 360" role="img" aria-labelledby="title desc">
  <title id="title">Closed-loop red-team harness</title>
  <desc id="desc">A simple loop showing evaluate, diagnose, remember, and mutate.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#081626"/>
      <stop offset="1" stop-color="#07101d"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff8a3d"/>
      <stop offset="1" stop-color="#6ee7ff"/>
    </linearGradient>
  </defs>
  <rect width="920" height="360" rx="24" fill="url(#bg)"/>
  <text x="48" y="58" fill="#ffb27a" font-family="JetBrains Mono, monospace" font-size="16" font-weight="700">closed-loop harness</text>
  <text x="48" y="84" fill="#a0bfda" font-family="Inter, sans-serif" font-size="13">Every run produces a decision and state for the next run.</text>

  <g fill="#0d1c2e" stroke="#395b78" stroke-width="1.5">
    <rect x="82" y="150" width="150" height="78" rx="14"/>
    <rect x="304" y="92" width="150" height="78" rx="14"/>
    <rect x="526" y="92" width="150" height="78" rx="14"/>
    <rect x="526" y="226" width="150" height="78" rx="14"/>
    <rect x="304" y="226" width="150" height="78" rx="14"/>
  </g>

  <g font-family="Inter, sans-serif" font-size="16" font-weight="800" fill="#f3f8ff" text-anchor="middle">
    <text x="157" y="196">scope</text>
    <text x="379" y="138">evaluate</text>
    <text x="601" y="138">diagnose</text>
    <text x="601" y="272">remember</text>
    <text x="379" y="272">mutate</text>
  </g>

  <g fill="none" stroke="url(#line)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M232 171C258 136 278 131 304 131"/>
    <path d="M454 131H526"/>
    <path d="M601 170V226"/>
    <path d="M526 265H454"/>
    <path d="M304 265C238 260 174 238 157 228"/>
  </g>
  <g fill="#ff8a3d">
    <path d="M304 131l-12-6v12z"/>
    <path d="M526 131l-12-6v12z"/>
    <path d="M601 226l-7-12h14z"/>
    <path d="M454 265l12-6v12z"/>
    <path d="M157 228l14 1-8 10z"/>
  </g>
</svg>
