<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 340" role="img" aria-labelledby="title desc">
  <title id="title">Evaluation gate stack</title>
  <desc id="desc">A simple pipeline showing leakage, novelty, refusal, coverage, and validity gates.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="1" stop-color="#0b1b2a"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff8a3d"/>
      <stop offset="1" stop-color="#6ee7ff"/>
    </linearGradient>
  </defs>
  <rect width="920" height="340" rx="24" fill="url(#bg)"/>
  <text x="48" y="58" fill="#ffb27a" font-family="JetBrains Mono, monospace" font-size="16" font-weight="700">evaluation gates</text>
  <text x="48" y="84" fill="#a0bfda" font-family="Inter, sans-serif" font-size="13">A candidate only becomes useful state after it survives multiple checks.</text>
  <line x1="116" y1="176" x2="804" y2="176" stroke="url(#line)" stroke-width="4" stroke-linecap="round"/>
  <path d="M804 176l-14-8v16z" fill="#6ee7ff"/>
  <g fill="#0d1c2e" stroke="#395b78" stroke-width="1.5">
    <rect x="72" y="130" width="128" height="92" rx="14"/>
    <rect x="232" y="130" width="128" height="92" rx="14"/>
    <rect x="392" y="130" width="128" height="92" rx="14"/>
    <rect x="552" y="130" width="128" height="92" rx="14"/>
    <rect x="712" y="130" width="128" height="92" rx="14"/>
  </g>
  <g font-family="Inter, sans-serif" text-anchor="middle">
    <text x="136" y="170" fill="#f3f8ff" font-size="16" font-weight="800">leakage</text>
    <text x="136" y="194" fill="#a0bfda" font-size="12">cap</text>
    <text x="296" y="170" fill="#f3f8ff" font-size="16" font-weight="800">novelty</text>
    <text x="296" y="194" fill="#a0bfda" font-size="12">cosine</text>
    <text x="456" y="170" fill="#f3f8ff" font-size="16" font-weight="800">refusal</text>
    <text x="456" y="194" fill="#a0bfda" font-size="12">signal</text>
    <text x="616" y="170" fill="#f3f8ff" font-size="16" font-weight="800">coverage</text>
    <text x="616" y="194" fill="#a0bfda" font-size="12">score</text>
    <text x="776" y="170" fill="#f3f8ff" font-size="16" font-weight="800">validity</text>
    <text x="776" y="194" fill="#a0bfda" font-size="12">meaning</text>
  </g>
</svg>
